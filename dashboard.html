<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Dashboard | 弱點掃描儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .risk-High { background-color: #fee2e2; color: #991b1b; }
        .risk-Medium { background-color: #fef3c7; color: #92400e; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .scanning-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- 標題與輸入框 -->
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-indigo-700 mb-2">自動化弱點掃描系統</h1>
            <p class="text-gray-500">輸入目標網址，即刻偵測安全性風險</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="targetUrl" placeholder="例如: http://127.0.0.1:8000" 
                    class="flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <button onclick="startScan()" id="scanBtn"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-lg transition duration-200">
                    開始掃描
                </button>
            </div>
            <p id="msg" class="mt-3 text-sm font-medium"></p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 左側：掃描任務列表 -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-md overflow-hidden">
                    <div class="bg-indigo-50 px-4 py-3 border-b border-indigo-100 flex justify-between items-center">
                        <h2 class="font-bold text-indigo-800">歷史任務</h2>
                        <button onclick="fetchScans()" class="text-xs text-indigo-600 hover:underline">重新整理</button>
                    </div>
                    <ul id="scanList" class="divide-y divide-gray-100 max-h-[500px] overflow-y-auto">
                        <!-- 任務項目將動態插入 -->
                        <li class="p-4 text-center text-gray-400">尚無紀錄</li>
                    </ul>
                </div>
            </div>

            <!-- 右側：掃描結果詳情 -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-md overflow-hidden min-h-[500px]">
                    <div id="detailHeader" class="bg-gray-800 text-white px-6 py-4 flex justify-between items-center">
                        <h2 class="font-bold">漏洞掃描結果</h2>
                        <span id="scanStatusBadge" class="px-3 py-1 rounded-full text-xs font-bold bg-gray-600">未選擇任務</span>
                    </div>
                    
                    <div class="p-6">
                        <div id="noData" class="text-center py-20">
                            <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                            <p class="mt-4 text-gray-400">請從左側點選任務查看細節</p>
                        </div>

                        <div id="findingsContainer" class="hidden">
                            <h3 class="text-lg font-bold mb-4 flex items-center">
                                <span class="bg-red-100 text-red-600 w-8 h-8 rounded-full flex items-center justify-center mr-2">!</span>
                                發現弱點列表
                            </h3>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="text-gray-400 text-sm border-b">
                                            <th class="pb-3 font-medium">類型</th>
                                            <th class="pb-3 font-medium">等級</th>
                                            <th class="pb-3 font-medium">位置</th>
                                            <th class="pb-3 font-medium">Payload</th>
                                        </tr>
                                    </thead>
                                    <tbody id="findingsList" class="text-sm">
                                        <!-- 漏洞項目將動態插入 -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8080";
        let currentScanId = null;

        // 1. 開始新的掃描
        async function startScan() {
            const url = document.getElementById('targetUrl').value;
            if (!url) return alert("請輸入網址");

            const msg = document.getElementById('msg');
            msg.textContent = "正在發送請求...";
            msg.className = "mt-3 text-sm font-medium text-blue-600";

            try {
                const res = await fetch(`${API_BASE}/start_scan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                const data = await res.json();
                msg.textContent = `任務已建立！ID: ${data.scan_id}`;
                msg.className = "mt-3 text-sm font-medium text-green-600";
                fetchScans(); // 刷新列表
            } catch (e) {
                msg.textContent = "連線 API 失敗，請確認 scanner_api.py 已啟動";
                msg.className = "mt-3 text-sm font-medium text-red-600";
            }
        }

        // 2. 獲取掃描任務列表
        async function fetchScans() {
            try {
                const res = await fetch(`${API_BASE}/scans`);
                const scans = await res.json();
                const list = document.getElementById('scanList');
                
                if (scans.length === 0) {
                    list.innerHTML = `<li class="p-4 text-center text-gray-400">尚無紀錄</li>`;
                    return;
                }

                list.innerHTML = scans.map(s => `
                    <li onclick="viewDetails('${s.id}')" class="p-4 hover:bg-gray-50 cursor-pointer transition border-l-4 ${s.id === currentScanId ? 'border-indigo-600 bg-indigo-50' : 'border-transparent'}">
                        <div class="flex justify-between items-start">
                            <span class="text-xs font-mono text-gray-400">${s.id}</span>
                            <span class="text-[10px] font-bold uppercase ${getStatusClass(s.status)}">${s.status}</span>
                        </div>
                        <div class="text-sm font-medium truncate mt-1">${s.target_url}</div>
                        <div class="text-[10px] text-gray-400 mt-1">${new Date(s.created_at).toLocaleString()}</div>
                    </li>
                `).join('');
            } catch (e) { console.error("Fetch scans error", e); }
        }

        // 3. 獲取特定掃描細節
        async function viewDetails(id) {
            currentScanId = id;
            fetchScans(); // 刷新列表選取狀態
            
            try {
                const res = await fetch(`${API_BASE}/scan_status/${id}`);
                const data = await res.json();
                
                document.getElementById('noData').classList.add('hidden');
                document.getElementById('findingsContainer').classList.remove('hidden');
                document.getElementById('scanStatusBadge').textContent = data.scan_info.status;
                document.getElementById('scanStatusBadge').className = `px-3 py-1 rounded-full text-xs font-bold ${getStatusBadgeClass(data.scan_info.status)}`;

                const list = document.getElementById('findingsList');
                if (data.findings.length === 0) {
                    list.innerHTML = `<tr><td colspan="4" class="py-10 text-center text-gray-400">未發現明顯漏洞</td></tr>`;
                } else {
                    list.innerHTML = data.findings.map(f => `
                        <tr class="border-b border-gray-50 hover:bg-gray-50">
                            <td class="py-4 font-bold text-gray-700">${f.type}</td>
                            <td class="py-4"><span class="px-2 py-1 rounded text-[10px] font-bold risk-${f.risk_level}">${f.risk_level}</span></td>
                            <td class="py-4 text-gray-500 font-mono text-xs">${f.url}</td>
                            <td class="py-4 text-gray-400 text-xs italic">${f.payload}</td>
                        </tr>
                    `).join('');
                }
            } catch (e) { alert("讀取細節失敗"); }
        }

        function getStatusClass(status) {
            if (status === 'Completed') return 'text-green-600';
            if (status === 'Scanning') return 'text-blue-600 scanning-pulse';
            if (status === 'Failed') return 'text-red-600';
            return 'text-gray-400';
        }

        function getStatusBadgeClass(status) {
            if (status === 'Completed') return 'bg-green-500';
            if (status === 'Scanning') return 'bg-blue-500 scanning-pulse';
            if (status === 'Failed') return 'bg-red-500';
            return 'bg-gray-600';
        }

        // 初始化
        fetchScans();
        // 每 5 秒自動更新列表（追蹤掃描進度）
        setInterval(fetchScans, 5000);
    </script>
</body>
</html>
